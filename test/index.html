<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>台北一區上班小助手</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="台北一區上班小助手">

<style>
:root{
  --primary: #E60012;      /* 小新上衣紅 */
  --primary-dark: #005BAC; /* 動感超人藍 */
  --secondary: #FFF100;    /* 小新短褲黃 */
  --border: #FFD700;       /* 金黃邊框 */
  --bg: #FFF9E1;           /* 溫暖奶油底色 */

  --btn-generate: #E60012; /* 紅色按鈕 */
  --btn-copy: #009E96;     /* 動感綠按鈕 */
  --card-bg: #FFFFFF;      /* 純白卡片 */
}

*,*::before,*::after{ box-sizing:border-box; }

body{
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  margin:0;
  padding:14px 14px 90px;
  background: var(--bg);
  display:flex;
  justify-content:center;
  color:#333;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:520px;
  margin-left:auto;
  margin-right:auto;
}

/* 🖍️ 標題配置 */
h1 { 
  text-align: center; 
  margin: 10px 0 30px; 
  font-size: 24px; 
  font-weight: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px; 
  color: var(--primary);
  text-shadow: 2px 2px 0px var(--secondary);
}

h1::before {
  content: "";
  display: block;
  width: 40px;  /* 調整圖片寬度 */
  height: 40px; /* 調整圖片高度 */
  background: url("shiro.png") no-repeat center;
  background-size: contain;
  flex-shrink: 0;
}

h1::after {
  content: "";
  display: block;
  width: 40px;
  height: 40px;
  background: url("Chocobi.png") no-repeat center;
  background-size: contain;
  flex-shrink: 0;
}

.subtitle{ text-align:center; font-size:13px; color:#555; margin-bottom:8px; font-weight: bold; }

/* 🔹 分頁標籤 */
.tab-header{
  display:flex;
  gap:8px;
  margin-bottom:30px;
}

.tab-header button{
  flex:1;
  padding:10px 0;
  border-radius:15px;
  border:2px solid var(--primary-dark);
  background:#fff;
  font-size:14px;
  font-weight: bold;
  color: var(--primary-dark);
  cursor: pointer;
}

.tab-header button.active{
  background:var(--primary-dark);
  color:#fff;
}

.section{
  background: var(--card-bg);
  border-radius:15px;
  border:3px solid var(--primary-dark);
  padding:16px;
  margin-bottom:12px;
  position:relative;
  box-shadow: 4px 4px 0px rgba(0, 91, 172, 0.1);
}

/* 將原本的小白位置換成小新，並設定為絕對定位 */
.section::before {
  content: ""; 
  /* 🛠️ 關鍵修改 1：設定為絕對定位，讓它漂浮起來不佔空間 */
  position: absolute; 
  
  /* 🛠️ 關鍵修改 2：設定位置 (數值可以根據你的圖檔微調) */
  top: -45px;    /* 向上偏移，數值越負，小新就飛得越高 */
  right: 10px;   /* 距離右邊的距離 */
  
  /* 原有的尺寸設定 */
  width: 80px;   /* 如果覺得小新太小，可以把 40 換成 80 或更大 */
  height: 80px; 
  background: url("shinchan.png") no-repeat center;
  background-size: contain;
  
  /* 🛠️ 關鍵修改 3：確保它在最上層，不被遮住 */
  z-index: 10;
  
  /* 提示：原本的 display: block 和 flex-shrink 就不需要了，因為 absolute 會自動處理 */
}

.section h2{ margin:0 0 10px; font-size:18px; font-weight:900; color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 8px; }

label{ display:block;font-size:14px;margin-top:4px; color: #333; font-weight: bold; }

input,select{
  width:100%;
  padding:10px; font-size:16px;
  margin-top:4px; margin-bottom:10px;
  border-radius:12px; border:2px solid #ccc;
  background:#fff;
}

input:focus, select:focus{
  outline: none;
  border-color: var(--primary-dark);
  box-shadow: 0 0 0 3px rgba(0, 91, 172, 0.1);
}

.actions{
  position:fixed;left:0;right:0;bottom:0;
  padding:12px 14px 15px;background:rgba(255,255,255,0.95);
  display:flex;gap:12px;border-top:3px solid var(--primary-dark);
  backdrop-filter:blur(10px);
  z-index:50;
}

button{
  padding:14px 0;
  border-radius:50px;
  border:none;
  font-size:16px;
  font-weight:900;
  cursor: pointer;
  box-shadow: 0 4px 0px rgba(0,0,0,0.1);
}

.btn-primary{ flex:1; background:var(--btn-generate); color:#fff; }
.btn-secondary{ flex:1; background:var(--btn-copy); color:#fff; }

/* =============== 🌟 Action Animation =============== */
.leaves span {
  position:absolute;
  top:-20px;
  display:block;
  font-size: 20px;
  animation: leafFall 8s linear infinite;
  opacity: 0;
}

/* 🎨 讓 6 個 Emoji 分散在螢幕各處 */
.leaves span:nth-child(1) { left: 5%;  animation-delay: 0s;   animation-duration: 10s; }
.leaves span:nth-child(2) { left: 20%; animation-delay: 3s;   animation-duration: 14s; }
.leaves span:nth-child(3) { left: 40%; animation-delay: 1.5s; animation-duration: 12s; }
.leaves span:nth-child(4) { left: 65%; animation-delay: 5s;   animation-duration: 15s; }
.leaves span:nth-child(5) { left: 80%; animation-delay: 0.5s; animation-duration: 11s; }
.leaves span:nth-child(6) { left: 92%; animation-delay: 4s;   animation-duration: 13s; }

@keyframes leafFall {
  0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.7; }
  100% { transform: translate(80px, 105vh) rotate(360deg); opacity: 0; }
}

.badge.green{ background:#D4EDDA; color:#155724; border: 1px solid; }
.badge.yellow{ background:#FFF3CD; color:#856404; border: 1px solid; }
.badge.red{ background:#F8D7DA; color:#721C24; border: 1px solid; }

.hidden {
  display: none !important;
}

</style>
</head>

<body>
<div class="container">

  <h1>台北一區上班小助手</h1>
  <header class="tab-header">
    <button id="tab-huddle" type="button" class="active">今日檢視</button>
    <button id="tab-plan" type="button">當月計畫</button>
  </header>

  <section id="huddle-view" class="section">
    <h2>當月行動方案完成度</h2>
    <div id="progress-dashboard">
      <p style="text-align:center; color:#999; font-size:14px;">資料載入中...</p>
    </div>
  </section>

  
<section id="plan-view" class="section hidden">
  <h2>個人月度行動計畫</h2>

  
  <label for="plan-name-select">1. 選擇姓名：</label>
  <select id="plan-name-select">
    <option value="">-- 請選擇 --</option>
  </select>

  <div style="display: flex; gap: 10px; margin-top: 10px;">
    <div style="flex: 1;">
      <label for="filter-customer">2. 客戶類別：</label>
      <select id="filter-customer">
        <option value="all">全部</option>
        <option value="新客">新客</option>
        <option value="舊客">舊客</option>
        <option value="潛客">潛客</option>
      </select>
    </div>
    <div style="flex: 1;">
      <label for="filter-item">3. 品項類別：</label>
      <select id="filter-item">
        <option value="all">全部</option>
        <option value="HA">HA</option>
        <option value="RS">RS</option>
      </select>
    </div>
  </div>

  <div id="plan-list-container" style="margin-top: 15px;">
    <p style="text-align:center; color:#999; font-size:14px;">請選擇條件以查看計畫</p>
  </div>
</section>



<div class="leaves">
  <span>🌻</span><span>🍪</span><span>🦖</span><span>🚌</span><span>🍭</span><span>🐘</span>
</div>

<script src="app.js?v=11"></script>

</body>
</html>
