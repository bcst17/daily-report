<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>台北一區上班小助手</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="台北一區上班小助手">

<style>
:root {
  /* Dinotaeng 溫暖大地色系 */
  --bg: #FDF8F1;           /* 背景：米杏色 */
  --primary-dark: #5D4037;  /* 主色：深可可棕 */
  --primary: #8D6E63;       /* 次主色：溫暖褐 */
  --secondary: #EADBC8;    /* 輔助：淺杏色 */
  --accent: #FFAB91;       /* 強調：肉粉色 (棉花糖配色) */
  --border: #D7CCC8;       /* 邊框：淡灰褐 */
  --card-bg: #FFFFFF;
}

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
  margin: 0;
  padding: 14px 14px 90px;
  background: var(--bg);
  color: #4E342E;
}

/* 🖍️ 標題：改為簡約文字與角色裝飾 */
h1 { 
  text-align: center; 
  margin: 20px 0 40px; 
  font-size: 24px; 
  font-weight: 900;
  color: var(--primary-dark);
  letter-spacing: 1px;
}

/* 🔹 分頁標籤：圓角與奶油感 */
.tab-header {
  display: flex;
  gap: 12px;
  margin-bottom: 50px;
}

.tab-header button {
  flex: 1;
  padding: 12px 0;
  border-radius: 12px;
  border: 2px solid var(--primary-dark);
  background: #fff;
  font-weight: bold;
  color: var(--primary-dark);
  box-shadow: 0 4px 0 var(--primary-dark);
  transition: all 0.2s;
}

.tab-header button.active {
  background: var(--primary-dark) !important;
  color: #fff !important;
  transform: translateY(2px);
  box-shadow: 0 2px 0 var(--primary-dark);
}

/* 🖼️ 卡片樣式：移除粗黑邊，改為圓潤陰影 */
.section {
  background: var(--card-bg);
  border-radius: 20px;
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 15px;
  position: relative;
  box-shadow: 0 8px 20px rgba(93, 64, 55, 0.08);
}

/* 角色裝飾位置 (您可自行替換圖片路徑) */
.section::before {
  content: ""; 
  position: absolute; 
  top: -85px; right: 10px;
  width: 80px; height: 80px;
  background: url("quokka_standing.png") no-repeat center; /* 站立 Quokka */
  background-size: contain;
  pointer-events: none;
}

.section::after {
  content: ""; 
  position: absolute; 
  top: -65px; left: 10px;
  width: 60px; height: 60px;
  background: url("marshmallow.png") no-repeat center; /* 棉花糖角色 */
  background-size: contain;
  pointer-events: none;
}

.section h2 { 
  margin: 0 0 15px; 
  font-size: 18px; 
  color: var(--primary-dark); 
  border-left: 6px solid var(--accent); 
  padding-left: 10px; 
}

/* 下拉選單與輸入框 */
input, select {
  border: 1px solid var(--border);
  background: #FAFAFA;
  border-radius: 10px;
}

/* 飄落特效：改為橡實與愛心 */
.leaves span:nth-child(3n+1) { font-size: 25px; }
</style>
</head>

<body>
<div class="container">
  <h1>台北一區上班小助手</h1>
  
  <header class="tab-header">
    <button id="tab-history" type="button">歷史回顧</button>
    <button id="tab-huddle" type="button" class="active">今日檢視</button>
    <button id="tab-plan" type="button">當月計畫</button>
  </header>

  <section id="huddle-view" class="section">
    <h2>當月行動方案完成度</h2>
    <div id="progress-dashboard">
      <p style="text-align:center; color:#999; font-size:14px;">資料載入中...</p>
    </div>
  </section>

  
<section id="plan-view" class="section hidden">
    <h2>個人月度行動計畫</h2>
    <label for="plan-name-select">1. 選擇姓名：</label>
    <select id="plan-name-select">
      <option value="">-- 請選擇 --</option>
    </select>

<div style="display: flex; gap: 10px; margin-top: 10px;">
      <div style="flex: 1;">
        <label for="filter-customer">2. 客戶類別：</label>
        <select id="filter-customer">
          <option value="all">全部</option>
          <option value="新客">新客</option>
          <option value="舊客">舊客</option>
          <option value="潛客">潛客</option>
        </select>
      </div>
      <div style="flex: 1;">
        <label for="filter-item">3. 品項類別：</label>
        <select id="filter-item">
          <option value="all">全部</option>
          <option value="HA">HA</option>
          <option value="RS">RS</option>
        </select>
      </div>
    </div>

  <div id="plan-list-container" style="margin-top: 15px;">
</section>

<section id="history-view" class="section hidden">
    <h2>每月成果回顧</h2>
    <p class="subtitle">點擊星星查看紀錄，點擊空白處分析原因</p>
    <div id="starry-map-container" style="margin-top: 20px;">
      <p style="text-align:center; color:#999; font-size:14px;">資料載入中...</p>
    </div>
  </section>

<div id="history-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; display:flex; justify-content:center; align-items:center; padding:20px;">
  <div style="background:white; width:100%; max-width:400px; border-radius:20px; padding:25px; position:relative; border: 3px solid var(--primary-dark); box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
    <div id="modal-content">
      </div>
    <button onclick="closeModal()" style="margin-top:20px; width:100%; background:#eee; color:#666; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">關閉</button>
  </div>
</div>
  

  <div id="plan-list-container" style="margin-top: 15px;">
</section>



<div class="leaves">
  <span>🔺</span> <span>🟢</span> <span>🟨</span> <span>🔺</span>
  <span>🟢</span>
  <span>🟨</span>
</div>

<script src="app.js?v=11"></script>

</body>
</html>
