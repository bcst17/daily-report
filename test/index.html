<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>台北一區上班小助手</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="台北一區上班小助手">

<style>
:root {
  --primary: #E50012;      /* 小新紅 */
  --primary-dark: #0076BE; /* 動感超人藍 */
  --secondary: #FFF100;    /* 小新黃 */
  --border: #BCE2F7;       /* 淺藍邊框 */
  --bg: #F0FAFF;           /* 極淺藍底色 */
  
  --btn-generate: #E50012; /* 紅色按鈕 */
  --btn-copy: #0076BE;     /* 藍色按鈕 */
  --card-bg: rgba(255, 255, 255, 0.95);
}

body {
  background-color: var(--bg);
  /* 實作小新睡衣幾何圖騰背景 */
  background-image: 
    radial-gradient(circle, #FFF100 10%, transparent 11%), /* 黃色圓形 */
    linear-gradient(45deg, #FF99CC 12%, transparent 13%),  /* 粉紅正方形 (模擬) */
    conic-gradient(from 0deg at 50% 50%, #76CA43 0deg 30deg, transparent 31deg); /* 綠色三角形 (模擬) */
  background-size: 80px 80px;
  background-position: 0 0, 40px 40px, 20px 20px;
}

/* 🦸‍♂️ 標題配置：動感超人與小白 */
h1 {
  color: var(--primary-dark);
  gap: 15px;
}

h1::before {
  background: url("action-mask.png") no-repeat center;
  background-size: contain;
  width: 45px; height: 45px;
}

h1::after {
  background: url("shiro.png") no-repeat center;
  background-size: contain;
  width: 40px; height: 40px;
}

/* 🍪 卡片裝飾：巧克比小餅乾 */
.section::before {
  content: "";
  position: absolute;
  top: -30px;
  left: -15px;
  width: 55px;
  height: 55px;
  background-image: url("chocobi.png");
  background-size: contain;
  background-repeat: no-repeat;
  transform: rotate(45deg); /* 傾斜 45 度 */
  z-index: 10;
}

/* 😴 右下角浮水印：睡衣小新 */
.footer-character {
  position: fixed; /* 統一固定位置 */
  right: -20px;
  bottom: -20px;
  width: 180px;    /* 統一尺寸，刪除 RWD 斷點差異 */
  height: auto;
  content: url("shin-chan-sleeping.png");
  opacity: 0.6;
  z-index: 5;
  pointer-events: none;
}

.tab-header button.active {
  background: var(--primary);
  border-color: var(--primary);
}
</style>
  
</head>

<body>
<div class="container">

  <h1>台北一區上班小助手</h1>
  <header class="tab-header">
    <button id="tab-huddle" type="button" class="active">今日檢視</button>
    <button id="tab-plan" type="button">當月計畫</button>
  </header>

  <section id="huddle-view" class="section">
    <h2>當月行動方案完成度</h2>
    <div id="progress-dashboard">
      <p style="text-align:center; color:#999; font-size:14px;">資料載入中...</p>
    </div>
  </section>

  
<section id="plan-view" class="section hidden">
  <h2>個人月度行動計畫</h2>

  
  <label for="plan-name-select">1. 選擇姓名：</label>
  <select id="plan-name-select">
    <option value="">-- 請選擇 --</option>
  </select>

  <div style="display: flex; gap: 10px; margin-top: 10px;">
    <div style="flex: 1;">
      <label for="filter-customer">2. 客戶類別：</label>
      <select id="filter-customer">
        <option value="all">全部</option>
        <option value="新客">新客</option>
        <option value="舊客">舊客</option>
        <option value="潛客">潛客</option>
      </select>
    </div>
    <div style="flex: 1;">
      <label for="filter-item">3. 品項類別：</label>
      <select id="filter-item">
        <option value="all">全部</option>
        <option value="HA">HA</option>
        <option value="RS">RS</option>
      </select>
    </div>
  </div>

  <div id="plan-list-container" style="margin-top: 15px;">
    <p style="text-align:center; color:#999; font-size:14px;">請選擇條件以查看計畫</p>
  </div>
</section>



<div class="leaves">
  <span>🌸</span><span>🌸</span><span>🌸</span><span>🌸</span><span>🌸</span><span>🌸</span>
</div>

<script src="app.js?v=11"></script>

</body>
</html>
