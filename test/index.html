<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>台北一區上班小助手</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="台北一區上班小助手">

<style>
:root {
  /* Dinotaeng 五月大地配色 */
  --bg: #F4EDE1;           /* 經典米色底 */
  --primary-dark: #5C4033;  /* 巧克力深棕 (文字與標籤) */
  --primary: #A8B890;       /* 手繪感森林綠 */
  --accent-orange: #E5B083; /* 烤棉花糖橘 */
  --border: #D7C9B7;       /* 溫和邊框色 */
  --card-bg: #FFFFFF;
}

*,*::before,*::after{ box-sizing:border-box; }

body{
  font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  margin:0;
  padding:14px 14px 90px;
  background: var(--bg);
  display:flex;
  justify-content:center;
  color:#333;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:520px;
  margin-left:auto;
  margin-right:auto;
}

/* 🖍️ 標題配置 */
h1 { 
  text-align: center; 
  margin: 10px 0 30px; 
  font-size: 24px; 
  font-weight: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px; 
  color: var(--primary);
  text-shadow: 2px 2px 0px var(--secondary);
}

h1::before {
  content: "";
  display: block;
  width: 50px;  /* 調整圖片寬度 */
  height: 50px; /* 調整圖片高度 */
  background: url("tree.png") no-repeat center;
  background-size: contain;
  flex-shrink: 0;
}

h1::after {
  content: "";
  display: block;
  width: 50px;
  height: 50px;
  background: url("tree2.png") no-repeat center;
  background-size: contain;
  flex-shrink: 0;
}

.subtitle{ text-align:center; font-size:13px; color:#555; margin-bottom:8px; font-weight: bold; }

/* 🔹 分頁標籤 */
.tab-header{
  display:flex;
  gap:8px;
  margin-bottom:60px;    
}

.tab-header button{
  flex:1;
  padding:10px 0;
  border-radius:15px;
  border:2px solid var(--primary-dark);
  background:#fff;
  font-size:14px;
  font-weight: bold;
  color: var(--primary-dark);
  cursor: pointer;
}

.tab-header button.active {
  background: var(--primary-dark) !important;
  color: #FFFFFF !important;
  border-color: var(--primary-dark);
}

.section{
  background: var(--card-bg);
  border-radius:15px;
  border:3px solid var(--primary-dark);
  padding:16px;
  margin-bottom:12px;
  position:relative;
  overflow: visible !important; /* 確保角色可以飛出邊框 */
  box-shadow: 4px 4px 0px rgba(0, 91, 172, 0.1);
}

/* 2. 右上角角色：小新 (Before) */
.section::before {
  content: "";
  position: absolute;
  top: -250px; /* 越負越低 */
  left: 50%;
  transform: translateX(-50%) rotate(1deg);
  
  width: 220px; /* 根據跳繩圖的實際寬度調整 */
  height: 220px;
  background: url("quokka.png") no-repeat center;
  background-size: contain;
  z-index: 10;
  pointer-events: none;
}

/* 3. 左上角角色：小白 (After) */
.section::after {
  content: ""; 
  position: absolute; 
  z-index: 10;
  
  /* 位置設定：建議也飛高一點，才不會壓到標題文字 */
  top: -50px;    /* 這裡原本是 -45px，改深一點可以讓它飛出邊框 */
  left: 0px;    
  
  /* 尺寸與圖片 */
  width: 50px;   
  height: 50px; 
  background: url("marsh.png") no-repeat center;
  background-size: contain;
  
  /* 避免擋住滑鼠點擊 */
  pointer-events: none;
}

.section h2{ margin:0 0 10px; font-size:18px; font-weight:900; color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 8px; }

label{ display:block;font-size:14px;margin-top:4px; color: #333; font-weight: bold; }

input,select{
  width:100%;
  padding:10px; font-size:16px;
  margin-top:4px; margin-bottom:10px;
  border-radius:12px; border:2px solid #ccc;
  background:#fff;
}

input:focus, select:focus{
  outline: none;
  border-color: var(--primary-dark);
  box-shadow: 0 0 0 3px rgba(0, 91, 172, 0.1);
}

.actions{
  position:fixed;left:0;right:0;bottom:0;
  padding:12px 14px 15px;background:rgba(255,255,255,0.95);
  display:flex;gap:12px;border-top:3px solid var(--primary-dark);
  backdrop-filter:blur(10px);
  z-index:50;
}

button{
  padding:14px 0;
  border-radius:50px;
  border:none;
  font-size:16px;
  font-weight:900;
  cursor: pointer;
  box-shadow: 0 4px 0px rgba(0,0,0,0.1);
}

.btn-primary{ flex:1; background:var(--btn-generate); color:#fff; }
.btn-secondary{ flex:1; background:var(--btn-copy); color:#fff; }

/* =============== 🌟 Action Animation =============== */
.leaves span {
  position:absolute;
  top:-20px;
  display:block;
  font-size: 20px;
  animation: leafFall 8s linear infinite;
  opacity: 0;
}

/* 🎨 讓 6 個 Emoji 分散在螢幕各處 */
.leaves span:nth-child(1) { left: 5%;  animation-delay: 0s;   animation-duration: 10s; }
.leaves span:nth-child(2) { left: 20%; animation-delay: 3s;   animation-duration: 14s; }
.leaves span:nth-child(3) { left: 40%; animation-delay: 1.5s; animation-duration: 12s; }
.leaves span:nth-child(4) { left: 65%; animation-delay: 5s;   animation-duration: 15s; }
.leaves span:nth-child(5) { left: 80%; animation-delay: 0.5s; animation-duration: 11s; }
.leaves span:nth-child(6) { left: 92%; animation-delay: 4s;   animation-duration: 13s; }

@keyframes leafFall {
  0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.7; }
  100% { transform: translate(80px, 105vh) rotate(360deg); opacity: 0; }
}

.badge.green{ background:#D4EDDA; color:#155724; border: 1px solid; }
.badge.yellow{ background:#FFF3CD; color:#856404; border: 1px solid; }
.badge.red{ background:#F8D7DA; color:#721C24; border: 1px solid; }

.hidden {
  display: none !important;
}


</style>
</head>

<body>
<div class="container">
  <h1>台北一區上班小助手</h1>
  
  <header class="tab-header">
    <button id="tab-history" type="button">歷史回顧</button>
    <button id="tab-huddle" type="button" class="active">今日檢視</button>
    <button id="tab-plan" type="button">當月計畫</button>
  </header>

  <section id="huddle-view" class="section">
    <h2>當月行動方案完成度</h2>
    <div id="progress-dashboard">
      <p style="text-align:center; color:#999; font-size:14px;">資料載入中...</p>
    </div>
  </section>

  
<section id="plan-view" class="section hidden">
    <h2>個人月度行動計畫</h2>
    <label for="plan-name-select">1. 選擇姓名：</label>
    <select id="plan-name-select">
      <option value="">-- 請選擇 --</option>
    </select>

<div style="display: flex; gap: 10px; margin-top: 10px;">
      <div style="flex: 1;">
        <label for="filter-customer">2. 客戶類別：</label>
        <select id="filter-customer">
          <option value="all">全部</option>
          <option value="新客">新客</option>
          <option value="舊客">舊客</option>
          <option value="潛客">潛客</option>
        </select>
      </div>
      <div style="flex: 1;">
        <label for="filter-item">3. 品項類別：</label>
        <select id="filter-item">
          <option value="all">全部</option>
          <option value="HA">HA</option>
          <option value="RS">RS</option>
        </select>
      </div>
    </div>

  <div id="plan-list-container" style="margin-top: 15px;">
</section>

<section id="history-view" class="section hidden">
    <h2>每月成果回顧</h2>
    <p class="subtitle">點擊星星查看紀錄，點擊空白處分析原因</p>
    <div id="starry-map-container" style="margin-top: 20px;">
      <p style="text-align:center; color:#999; font-size:14px;">資料載入中...</p>
    </div>
</section>

<div id="history-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; display:flex; justify-content:center; align-items:center; padding:20px;">
  <div style="background:white; width:100%; max-width:400px; border-radius:20px; padding:25px; position:relative; border: 3px solid var(--primary-dark); box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
    <div id="modal-content">
      </div>
    <button onclick="closeModal()" style="margin-top:20px; width:100%; background:#eee; color:#666; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">關閉</button>
  </div>
</div>
  

  <div id="plan-list-container" style="margin-top: 15px;">
</section>



<div class="leaves">
  <span>🤎</span> <span>☁️</span> <span>🍭</span> <span>🤎</span>
  <span>☁️</span>
  <span>🍭</span>
</div>

<script src="app.js?v=12"></script>

</body>
</html>
